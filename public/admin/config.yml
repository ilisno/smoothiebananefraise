# Configuration Backend (GitHub)
backend:
  name: github
  repo: ilisno/smoothiebananefraise # Votre dépôt GitHub
  branch: main # Votre branche principale
  auth_type: implicit # Type d'authentification OAuth
  app_id: Ov23liaHxRBcNz4ZxcOB # Votre Client ID GitHub OAuth App

# Configuration Média (où stocker les images uploadées)
media_folder: "public/uploads/blog" # Chemin dans le dépôt
public_folder: "/uploads/blog" # Chemin public sur le site

# Définition des Collections (ici, une seule collection gérant un fichier)
collections:
  - name: "blog" # Nom interne simple pour la collection
    label: "Blog" # Nom affiché dans l'interface Decap CMS
    label_singular: "Article" # Nom pour un seul élément
    description: "Gérer les articles de blog ici"
    delete: false # Empêche la suppression du fichier JSON lui-même
    editor:
      preview: false # Désactive la prévisualisation dans l'éditeur
    files: # Indique qu'on cible des fichiers spécifiques
      - name: "articles" # Nom interne pour cette entrée de fichier
        label: "Articles de Blog" # Label affiché pour cette section
        file: "src/lib/blogData.json" # Chemin vers le fichier JSON unique
        fields: # Définit la structure du contenu du fichier JSON
          - name: "posts" # Clé dans le JSON contenant le tableau d'articles (DOIT correspondre à votre JSON)
            label: "Liste des Articles"
            label_singular: "Article"
            widget: "list"
            summary: "{{fields.title}}" # Affiche le titre dans la liste de l'interface
            allow_add: true # Permet d'ajouter de nouveaux articles
            allow_delete: true # Permet de supprimer des articles
            fields: # Définit les champs pour CHAQUE objet dans le tableau "posts"
              - { label: "Titre", name: "title", widget: "string" }
              - { label: "Slug (URL)", name: "slug", widget: "string", pattern: ['^[a-z0-9]+(?:-[a-z0-9]+)*$', "Utiliser uniquement minuscules, chiffres et tirets"] }
              - { label: "Catégorie", name: "category", widget: "string", hint: "Ex: hypertrophie, nutrition, debutant" }
              - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", dateFormat: "DD/MM/YYYY", timeFormat: false }
              - { label: "Extrait", name: "excerpt", widget: "text" }
              - { label: "Contenu", name: "content", widget: "markdown" }
              - { label: "Image URL", name: "imageUrl", widget: "image", required: false } # Utilise media_folder/public_folder définis plus haut
              - { label: "Meta Description", name: "metaDescription", widget: "string" }
              - { label: "Meta Mots-clés", name: "metaKeywords", widget: "list", field: { label: "Mot-clé", name: "keyword", widget: "string"} }