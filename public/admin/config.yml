backend:
  name: github
  repo: ilisno/smoothiebananefraise
  branch: main

media_folder: "public/uploads/blog"
public_folder: "/uploads/blog"

collections:
  - name: "blog_settings" # Nom de la collection globale pour ce fichier
    label: "Gestion du Blog"
    delete: false # On ne supprime pas le fichier blogData.json lui-même
    editor:
      preview: false
    files: # Définit que nous travaillons avec des fichiers spécifiques
      - name: "posts_data" # Un nom interne pour cette configuration de fichier
        label: "Articles de Blog" # Ce qui sera affiché dans l'UI pour cette section
        file: "src/lib/blogData.json" # Le fichier JSON unique
        description: "Gérer tous les articles de blog ici"
        fields: # Champs de l'objet racine dans blogData.json
          - name: "posts" # Doit correspondre à la clé dans blogData.json qui contient le tableau
            label: "Liste des Articles"
            label_singular: "Article"
            widget: "list"
            allow_add: true
            allow_delete: true
            summary: "{{fields.title}}" # Affiche le titre de l'article dans la liste UI
            fields: # Champs pour CHAQUE article dans la liste "posts"
              - { label: "Titre", name: "title", widget: "string" }
              - { label: "Slug (URL)", name: "slug", widget: "string", hint: "Partie de l'URL, ex: mon-super-article. Doit être unique." }
              - { label: "Catégorie", name: "category", widget: "string", hint: "Ex: hypertrophie, nutrition, debutant. Utilisé dans l'URL." }
              - { label: "Date de Publication", name: "date", widget: "datetime", format: "YYYY-MM-DD", dateFormat: "DD/MM/YYYY", timeFormat: false }
              - { label: "Extrait (pour la carte)", name: "excerpt", widget: "text" }
              - { label: "Contenu Principal", name: "content", widget: "markdown", hint: "Le contenu principal de l'article, supporte le Markdown et le HTML." }
              - { label: "Image de l'article (URL ou chemin)", name: "imageUrl", widget: "image", required: false, media_folder: "public/uploads/blog/posts", public_folder: "/uploads/blog/posts", hint: "Uploadez une image ou entrez un chemin public comme /blog/mon-image.jpg" }
              - { label: "Méta Description (SEO)", name: "metaDescription", widget: "string" }
              - { label: "Méta Mots-clés (SEO)", name: "metaKeywords", widget: "list", field: { label: "Mot-clé", name: "keyword", widget: "string"} }